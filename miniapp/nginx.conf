server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (except Let's Encrypt challenges)
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/app.crunchygherkins.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.crunchygherkins.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed assets aggressively (filenames include content hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache index.html (so users always get the latest version)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Reverse proxy API requests to the api service
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
